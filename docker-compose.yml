version: '3.8'

services:
  socket-server:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - CORS_ORIGIN=http://localhost:4200
      - HOST=0.0.0.0
      - PORT=3000
      # Uncomment to enable multi-instance room pub/sub:
      # - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
